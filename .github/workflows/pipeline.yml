name: SmartWeatherAI Pipeline

# Runs the SAME continuous loop we run locally (main.py → main_loop), 24/7 in
# GitHub's cloud — no Cloud Run, no billing. Public repo ⇒ free unlimited
# minutes. The loop samples the "excel" every 10 min, stores the 20-min
# actual-vs-predicted cycle to RTDB, and aggregates the hourly trend — exactly
# like local. GitHub caps a single job at 6h, so the loop exits cleanly at
# ~5h50m (MAX_RUNTIME_SECONDS) and the schedule restarts it; durable state
# lives in RTDB, so the handoff is seamless.
on:
  # Start the loop the moment this lands on main — no waiting for the first
  # cron tick, and no PAT needed to bootstrap.
  push:
    branches: [ main ]
  schedule:
    # Restart the loop every 6h (GitHub cron is best-effort; a few min drift is
    # fine — the loop is what runs continuously, cron only re-launches it).
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # manual "Run workflow" button

# One loop at a time. A fresh restart cancels the previous (near-expired) job so
# there's a clean handoff instead of two loops writing at once.
concurrency:
  group: swai-pipeline
  cancel-in-progress: true

jobs:
  run-cycle:
    runs-on: ubuntu-latest
    # Safety ceiling just under GitHub's 6h hard cap; the loop itself exits
    # earlier via MAX_RUNTIME_SECONDS with a clean (green) status.
    timeout-minutes: 355
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Reuse the trained model + NASA dataset across restarts so we don't
      # re-download/retrain on every launch. ensure_trained() still retrains
      # automatically when the dashboard changes the coordinates.
      - name: Restore model + dataset cache
        uses: actions/cache@v4
        with:
          path: |
            data
            models
          key: swai-cache-${{ github.run_id }}
          restore-keys: |
            swai-cache-

      # Write the service-account key from the encrypted secret. Passed via env
      # (not the command line) so it never appears in logs.
      - name: Write Firebase service account
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$SA_JSON" > serviceAccountKey.json

      - name: Run the continuous prediction loop
        env:
          FIREBASE_DATABASE_URL: https://weather-station-orpl-default-rtdb.asia-southeast1.firebasedatabase.app
          # Exit cleanly at 5h50m so the 6h schedule can relaunch a fresh loop.
          MAX_RUNTIME_SECONDS: "21000"
        run: python main.py
